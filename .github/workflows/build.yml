name: Build PDF Reader Executable

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Download Tauri Default Icons
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "src-tauri/icons"
          $baseUrl = "https://raw.githubusercontent.com/tauri-apps/tauri/refs/heads/tauri-v1/tooling/cli/templates/app/src-tauri/icons"
          Invoke-WebRequest -Uri "$baseUrl/icon.ico" -OutFile "src-tauri/icons/icon.ico"
          Invoke-WebRequest -Uri "$baseUrl/icon.icns" -OutFile "src-tauri/icons/icon.icns"
          Invoke-WebRequest -Uri "$baseUrl/32x32.png" -OutFile "src-tauri/icons/32x32.png"
          Invoke-WebRequest -Uri "$baseUrl/128x128.png" -OutFile "src-tauri/icons/128x128.png"
          Invoke-WebRequest -Uri "$baseUrl/128x128@2x.png" -OutFile "src-tauri/icons/128x128@2x.png"

      - name: Compile Windows Executable
        working-directory: src-tauri
        run: cargo build --release

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: My-PDF-Reader-Windows
          path: src-tauri/target/release/my-pdf-reader.exe
